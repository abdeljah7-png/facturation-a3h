{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}

<!-- ========================= -->
<!-- INFO CLIENT AUTOMATIQUE -->
<!-- ========================= -->

<script>
document.addEventListener("DOMContentLoaded", function () {

    const clientSelect = document.getElementById("id_client");

    if (!clientSelect) return;

    clientSelect.addEventListener("change", function () {

        const clientId = this.value;
        if (!clientId) return;

        fetch("/ventes/client-info/" + clientId + "/")
        .then(response => response.json())
        .then(data => {

            const mfField = document.querySelector(".field-mf_client .readonly");
            const adresseField = document.querySelector(".field-adresse_client .readonly");
            const telField = document.querySelector(".field-telephone_client .readonly");
            const emailField = document.querySelector(".field-email_client .readonly");

            if (mfField) mfField.innerText = data.mf || "";
            if (adresseField) adresseField.innerText = data.adresse || "";
            if (telField) telField.innerText = data.telephone || "";
            if (emailField) emailField.innerText = data.email || "";

        });

    });

});
</script>


<!-- ========================= -->
<!-- PRODUIT -> PRIX + TVA -->
<!-- ========================= -->

<script>
document.addEventListener("change", function(e) {

    if (e.target && e.target.name.includes("produit")) {

        const select = e.target;
        const produitId = select.value;

        if (!produitId) return;

        fetch("/ventes/produit-info/" + produitId + "/")
        .then(response => response.json())
        .then(data => {

            const row = select.closest("tr");

            const prixField = row.querySelector("input[name$='prix_ht']");
            const tvaField = row.querySelector("input[name$='taux_tva']");

            if (prixField) prixField.value = data.prix_ht;
            if (tvaField) tvaField.value = data.taux_tva;

        });

    }

});
</script>


<!-- ========================= -->
<!-- CALCUL LIGNE FACTURE -->
<!-- ========================= -->

<script>

function calculerLigne(row) {

    const qte = parseFloat(row.querySelector("input[name$='quantite']")?.value || 0);
    const prix = parseFloat(row.querySelector("input[name$='prix_ht']")?.value || 0);
    const remise = parseFloat(row.querySelector("input[name$='remise']")?.value || 0);
    const tva = parseFloat(row.querySelector("input[name$='taux_tva']")?.value || 0);

    const totalHT = qte * prix;
    const montantRemise = totalHT * (remise / 100);
    const baseTVA = totalHT - montantRemise;
    const totalTVA = baseTVA * (tva / 100);
    const totalTTC = baseTVA + totalTVA;

    let totalCell = row.querySelector(".total-ligne");

    if (!totalCell) {

        totalCell = document.createElement("td");
        totalCell.classList.add("total-ligne");

        row.appendChild(totalCell);

    }

    totalCell.innerHTML = "<b>" + totalTTC.toFixed(3) + " TND</b>";

}


document.addEventListener("input", function(e) {

    if (
        e.target.name.includes("quantite") ||
        e.target.name.includes("prix_ht") ||
        e.target.name.includes("remise") ||
        e.target.name.includes("taux_tva")
    ) {

        const row = e.target.closest("tr");
        calculerLigne(row);

    }

});

</script>

{% endblock %}
