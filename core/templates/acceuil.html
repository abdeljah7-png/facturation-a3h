<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Application Facturation</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:80px;">

    <h1>Application Facturation (Commercial + Gestion de stock)</h1>
    <h3>Conçu par Jah.Abdelfattah</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Utilisateur"
               style="padding:10px; width:250px;"><br><br>

        <input type="password" name="password" placeholder="Mot de passe"
               style="padding:10px; width:250px;"><br><br>

        <button type="submit"
            style="background:linear-gradient(45deg,#2196F3,#21CBF3);
                   border:none;
                   padding:12px 30px;
                   color:white;
                   font-size:16px;
                   border-radius:30px;">
            Se connecter
        </button>

    </form>

</body>
</html>
